<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Autores</title>
    <style>
        *{box-sizing:border-box}

        body{
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            background:var(--bg);
            color:#222;
            margin:0;
            padding:2rem;
            display:flex;
            flex-direction:column;
            align-items:center;
            min-height:100vh;
        }

        /* Form */
        #AutoresForm{
            width:100%;
            max-width:720px;
            background:var(--card);
            padding:1.25rem;
            border-radius:10px;
            box-shadow:0 6px 20px rgba(15,23,42,0.06);
            display:grid;
            gap:.75rem;
        }

        label{
            font-size:.95rem;
            color:var(--muted);
            font-weight:600;
        }

        input[type="text"]{
            width:100%;
            padding:.6rem .75rem;
            border:1px solid #e6e9ef;
            border-radius:8px;
            font-size:.95rem;
            outline:none;
            transition:box-shadow .15s, border-color .15s;
        }

        input[type="text"]:focus{
            border-color:var(--primary);
            box-shadow:0 0 0 4px rgba(11,116,209,0.08);
        }

        /* Button */
        #adicionarAutorBtn{
            appearance:none;
            border:0;
            background: black;
            color:#ffffff;
            padding:.7rem .9rem;
            border-radius:8px;
            font-weight:700;
            cursor:pointer;
            width:max-content;
            margin-top:.25rem;
        }

        #adicionarAutorBtn:hover{ filter:brightness(.95) }

        /* Cards area */
        #cards{
            width:100%;
            max-width:960px;
            margin-top:1rem;
            display:grid;
            gap:1rem;
            grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
        }

        /* Individual card */
        .card{
            background:var(--card);
            padding:.85rem;
            border-radius:10px;
            box-shadow:0 4px 14px rgba(15,23,42,0.05);
            display:flex;
            flex-direction:column;
            gap:.5rem;
        }

        .card h3{
            margin:0;
            font-size:1rem;
        }

        .card p{
            margin:0;
            color:var(--muted);
            font-size:.9rem;
        }

        /* Responsive */
        @media (max-width:520px){
            body{padding:1rem}
            #AutoresForm{padding:1rem}
            #cards{grid-template-columns:1fr}
        }
    </style>
  </head>
  <body>
    <form id="AutoresForm">
      <label for="nome">Nome do Autor</label>
      <input type="text" id="nomeInput" name="nome" required />

      <label for="biografia">Digite a biografia do Autor</label>
      <input type="text" id="biografiaInput" name="biografia" required />
      <button id="adicionarAutorBtn" type="submit">
        Adicionar Autor e Livro
      </button>
    </form>

    <div id="cards"></div>

    <script src="Autores.js"></script>
  </body>
</html>
